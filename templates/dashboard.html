<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sentinel Gateway | Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#0b0b0f; --card:#14141b; --muted:#a6a6b3; --text:#f5f5f7;
      --border:rgba(255,255,255,.10); --shadow:0 18px 50px rgba(0,0,0,.45); --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 20% 10%, rgba(160,140,255,.18), transparent 55%),
                  radial-gradient(900px 700px at 85% 20%, rgba(80,210,255,.16), transparent 50%),
                  var(--bg);
      color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .shell{width:min(1000px, 100%); display: grid; grid-template-columns: 1fr 1fr; gap: 20px;}
    @media (max-width: 850px) { .shell { grid-template-columns: 1fr; } }

    .top { grid-column: 1 / -1; display:flex; justify-content:space-between; align-items: flex-end; margin-bottom: 10px; }
    .title { font-size:28px; font-weight:650; margin:0; }
    .badge { display:inline-flex; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--border); border-radius:999px; background:rgba(255,255,255,.04); font-size:13px; color:var(--muted); }
    .dot { width:8px; height:8px; border-radius:999px; background:#22c55e; box-shadow:0 0 0 4px rgba(34,197,94,.18); }

    .card { background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction: column; }
    .card-inner { padding:22px; flex-grow: 1; }

    label { display:block; font-size:12px; color:var(--muted); margin-bottom:8px; }
    input { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,.25); color:var(--text); outline:none; margin-bottom: 15px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    button { flex: 1; border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text); padding:12px; border-radius:14px; font-weight:600; cursor:pointer; transition: transform .06s ease; }
    button:active { transform:scale(.98) }
    .primary { background:linear-gradient(180deg, rgba(120,170,255,.40), rgba(120,170,255,.18)); border-color: rgba(120,170,255,.55); }

    .msg { margin-top:16px; padding:12px; border-radius:14px; border:1px solid var(--border); background:rgba(0,0,0,.22); font-size:14px; font-family: monospace; min-height: 60px; }
    .footer { padding:14px 22px; border-top:1px solid var(--border); color:var(--muted); font-size:11px; display:flex; justify-content:space-between; }
    canvas { max-height: 250px !important; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div>
        <h1 class="title">Sentinel Gateway</h1>
        <p style="color:var(--muted); margin: 5px 0 0 0;">Real-time Telemetry & Command Audit</p>
      </div>
      <div class="badge"><span class="dot"></span> System Live</div>
    </div>

    <div class="card">
      <div class="card-inner">
        <label>Operator</label>
        <input id="username" value="Tarique" autocomplete="off" />
        <label>Session</label>
        <input id="session_id" value="session1" autocomplete="off" />

        <div class="actions">
          <button class="primary" onclick="sendCommand('ON', 'LED')">Turn LED On</button>
          <button onclick="sendCommand('OFF', 'LED')">Turn LED Off</button>
          <button onclick="sendCommand('STATUS', 'LED')">Check Status</button>
        </div>
        <div id="status-display" class="msg">Awaiting command...</div>
      </div>
      <div class="footer">
        <div>Device: <code>esp32-D0WDQ6</code></div>
        <div>Path: <code>/dev/ttyUSB0</code></div>
      </div>
    </div>

    <div class="card">
      <div class="card-inner">
        <label>Hardware Latency (ms)</label>
        <canvas id="latencyChart"></canvas>
      </div>
      <div class="footer">
        <div>Source: <code>actions.csv</code></div>
        <div id="avg-latency">Avg: -- ms</div>
      </div>
    </div>
  </div>

  <script>
    // Initialize the Chart
    const ctx = document.getElementById('latencyChart').getContext('2d');
    let latencyData = [];
    let labels = [];

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Response Time (ms)',
                data: latencyData,
                borderColor: '#38bdf8',
                backgroundColor: 'rgba(56, 189, 248, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                x: { display: false }
            },
            plugins: { legend: { display: false } }
        }
    });

    async function sendCommand(value, target) {
        const display = document.getElementById('status-display');
        const user = document.getElementById('username').value;
        const sid = document.getElementById('session_id').value;

        // Save the operator details to the browser's local storage
        localStorage.setItem('iot_username', user);
        localStorage.setItem('iot_session', sid);

        try {
            const response = await fetch('/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user, session_id: sid,
                    action: `CMD_${value}`, target: target, value: value
                })
            });

            const data = await response.json();

            if (data.status === "SUCCESS") {
                display.innerHTML = `SUCCESS: Received "${data.response}"<br>Latency: ${data.latency_ms}ms`;
                display.style.color = "#22c55e";

                // Update the Chart
                updateChart(data.latency_ms);
            } else {
                display.innerHTML = `FAILED: ${data.error}`;
                display.style.color = "#ef4444";
            }
        } catch (err) {
            display.innerHTML = "CONNECTION ERROR: Gateway unreachable.";
        }
    }

    function updateChart(ms) {
        labels.push(new Date().toLocaleTimeString().split(' ')[0]);
        latencyData.push(ms);

        // Keep only last 15 data points
        if (latencyData.length > 15) {
            labels.shift();
            latencyData.shift();
        }

        chart.update();

        // Update Average
        const avg = latencyData.reduce((a, b) => a + b, 0) / latencyData.length;
        document.getElementById('avg-latency').innerText = `Avg: ${avg.toFixed(1)} ms`;
    }

    // Auto-run when the page loads
    window.onload = () => {
        // 1. Restore the last used Username and Session ID
        if (localStorage.getItem('iot_username')) {
            document.getElementById('username').value = localStorage.getItem('iot_username');
            document.getElementById('session_id').value = localStorage.getItem('iot_session');
        }
        
        // 2. Silently ping the ESP32 to check if it's online and get current status
        sendCommand('STATUS', 'LED');
    };
  </script>
</body>
</html>
